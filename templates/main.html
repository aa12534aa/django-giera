<!DOCTYPE html>
<html> 
    <head>
        <title>Giera</title>
    </head>
    <body>
        {% if request.user.is_authenticated %}
        <a href="{% url 'logout-page' %}">
            <h1>Logout</h1>
        </a>
        {% else %}
            <a href="{% url 'login-page' %}">
                <h1>Log in/Register</h1>
            </a>
        {% endif %}

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}
        
        {% block content %}
        {% endblock %}
    </body>
</html>
