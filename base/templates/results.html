{% extends 'main.html' %}
{% load static %}
{% block content %}
<body>
    <div style="margin-left: 200px;">
        <a href="{% url '' %}">Go Home</a>
        <div style="display: flex;">
            <h1>LobbyId: {{lobbyId}}</h1>

            <div style="display: flex;">
                <h2>Timer: </h2>
                <h2 id="timer"></h2>
            </div>
        </div>

        <h1>Results:</h1>
        <div id="scoreTable"></div>
    </div>
    {{ lobbyId|json_script:"lobby-id" }}
    {{ players|json_script:"players-data" }}
    <script>
        const lobbyId = JSON.parse(document.getElementById('lobby-id').textContent);
        const players = JSON.parse(document.getElementById('players-data').textContent);
    </script>
    <script src="{% static 'results.js' %}"></script>
</body>
{% endblock %}
